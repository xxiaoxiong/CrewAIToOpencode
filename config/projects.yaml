projects:
  demo-project:
    name: demo-project
    repo_path: "demo-project"

    opencode_base_url: "http://127.0.0.1:4096"
    opencode_username: "opencode"
    opencode_password: "123456"

    opencode_agent: "build"
    opencode_agents:
      explorer: "explore"
      planner: "plan"
      coder: "build"
      repairer: "build"
      validator: "general"
      general: "general"
    opencode_provider_id: ""
    opencode_model_id: ""
    opencode_timeouts:
      default: 600
      explore: 180
      plan: 300
      build: 900
      repair: 900
      validate: 300
    prompt_limits:
      build_max_chars: 12000
      retry_max_chars: 8000
      plan_max_chars: 8000
      section_max_chars: 2500

    test_command: "python -c \"print('demo tests ok')\""
    lint_command: ""

    denied_paths:
      - ".git/"
      - "node_modules/"
      - ".env"
      - ".env.local"
      - "dist/"
      - "build/"

    max_iterations: 3
    reviewer_enabled: true
    lint_enabled: false
    test_enabled: false
    worktree_enabled: false

    task_pipeline:
      explore_enabled: true
      architect_enabled: true
      opencode_plan_enabled: false
      build_enabled: true
      tester_enabled: true
      validator_enabled: true
      reviewer_enabled: true
      reporter_enabled: true
      max_iterations: 3

    modes:
      quick:
        explore_enabled: false
        architect_enabled: false
        opencode_plan_enabled: false
        tester_enabled: false
        validator_enabled: true
        reviewer_enabled: true
        reporter_enabled: true
      standard:
        explore_enabled: true
        architect_enabled: true
        opencode_plan_enabled: false
        tester_enabled: true
        validator_enabled: true
        reviewer_enabled: true
        reporter_enabled: true
      full:
        explore_enabled: true
        architect_enabled: true
        opencode_plan_enabled: false
        tester_enabled: true
        validator_enabled: true
        reviewer_enabled: true
        reporter_enabled: true

    crewai:
      enabled: false
      mode: "hybrid_planning_review"
      planning_enabled: true
      tester_analysis_enabled: true
      reviewer_enabled: true
      reporter_enabled: true
      llm:
        model: ""
        base_url: ""
        api_key: ""
        temperature: 0
      agents:
        architect:
          role: "Software architect"
        tester:
          role: "Test failure analyst"
        reviewer:
          role: "Senior code reviewer"
        reporter:
          role: "Delivery reporter"
